name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
      - "tests/**.py"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          cat > /tmp/sa-key.json <<'EOF'
          ${{ secrets.CLOUD_CREDENTIALS }}
          EOF
          chmod 600 /tmp/sa-key.json
          python -m json.tool /tmp/sa-key.json > /dev/null
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json

      - name: Configure DVC GCS credentials
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json

      - name: Pull data with DVC
        run: |
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc -v

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACCURACY=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT
          echo "Accuracy: $ACCURACY"

      - name: Upload model to Cloud Storage
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage

          bucket_name = os.environ["CLOUD_BUCKET"]
          source_file = "models/model.pkl"
          destination_blob = "models/latest/model.pkl"

          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob(destination_blob)
          blob.upload_from_filename(source_file)

          print(f"Uploaded {source_file} to gs://{bucket_name}/{destination_blob}")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.6

          print(f"Accuracy: {accuracy}")
          print(f"Threshold: {threshold}")

          if accuracy < threshold:
              raise SystemExit(f"Eval gate failed: accuracy {accuracy} < {threshold}")

          print("Eval gate passed.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Restart inference service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve

            echo "Waiting for server startup..."

            for i in {1..12}; do
              if curl -fsS http://localhost:8000/health; then
                echo "Health check passed"
                exit 0
              fi

              echo "Retry $i..."
              sleep 5
            done

            echo "Health check failed"
            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
            fi

            echo "Deploy successful"